<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CFC Modelo | Autoescola Futurista em Natal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-dark: #06080a;
    --bg-card: #0f1318;
    --sinal-verde: #00E676; /* Verde farol aceso */
    --sinal-amarelo: #FFD600; /* Amarelo atenção */
    --sinal-laranja: #FF5252; /* Laranja cone de trânsito */
    --texto-neon: #E0E6ED;
    --borda: #1e252f;
    --white: #FFFFFF;
  }

  *{margin:0;padding:0;box-sizing:border-box;}
  html{scroll-behavior:smooth;}

  body{
    background:var(--bg-dark);
    color:var(--texto-neon);
    font-family:'Plus Jakarta Sans', sans-serif;
    line-height:1.6;
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }

  h1,h2,h3{
    font-family:'Orbitron', sans-serif;
    font-weight:700;
    letter-spacing:1px;
  }

  a{color:inherit;text-decoration:none;}

  /* ===== TOPO NEON ===== */
  .topbar{
    position:fixed;
    top:0;left:0;right:0;
    z-index:50;
    background:rgba(6, 8, 10, 0.85);
    backdrop-filter:blur(12px);
    border-bottom:1px solid var(--borda);
  }
  .topbar .wrap{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:16px 28px;
    max-width:1120px;
    margin:0 auto;
  }
  .brand{
    display:flex;
    align-items:center;
    gap:10px;
    font-family:'Orbitron', sans-serif;
    font-weight:900;
    font-size:1.4rem;
    color:var(--white);
    text-shadow: 0 0 10px rgba(0, 230, 118, 0.3);
  }
  .brand span{ color:var(--sinal-amarelo); }
  .topbar-cta{
    background:transparent;
    color:var(--sinal-verde);
    border: 1px solid var(--sinal-verde);
    padding:10px 20px;
    border-radius:8px;
    font-size:0.85rem;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:1px;
    transition: 0.3s ease;
    box-shadow: 0 0 15px rgba(0, 230, 118, 0.1);
  }
  .topbar-cta:hover{
    background:var(--sinal-verde);
    color:var(--bg-dark);
    box-shadow: 0 0 20px rgba(0, 230, 118, 0.4);
  }

  /* ===== HERO FUTURISTA ===== */
  .hero{
    padding:160px 0 90px;
    position:relative;
  }
  .wrap{
    max-width:1120px;
    margin:0 auto;
    padding:0 28px;
  }
  .hero-grid{
    display:grid;
    grid-template-columns:1.1fr 0.9fr;
    gap:56px;
    align-items:center;
  }
  .eyebrow{
    display:inline-flex;
    align-items:center;
    gap:8px;
    font-size:0.75rem;
    font-weight:700;
    letter-spacing:0.15em;
    text-transform:uppercase;
    color:var(--sinal-amarelo);
    margin-bottom:22px;
  }
  .hero h1{
    font-size:clamp(2.2rem, 4.5vw, 3.4rem);
    line-height:1.1;
    color:var(--white);
  }
  .hero h1 em{
    font-style:normal;
    color:var(--sinal-verde);
    text-shadow: 0 0 15px rgba(0, 230, 118, 0.3);
  }
  .hero p.lede{
    font-size:1.05rem;
    color:#94a3b8;
    max-width:480px;
    margin-top:22px;
  }
  .hero-actions{
    margin-top:34px;
    display:flex;
    gap:16px;
    flex-wrap:wrap;
  }
  .btn-primary{
    background:var(--sinal-laranja);
    color:var(--white);
    padding:16px 28px;
    border-radius:8px;
    font-weight:700;
    text-transform:uppercase;
    font-size:0.9rem;
    letter-spacing:1px;
    display:inline-flex;
    align-items:center;
    gap:10px;
    box-shadow:0 0 20px rgba(232,99,75,0.3);
    transition: 0.2s ease;
  }
  .btn-primary:hover{
    transform:translateY(-2px);
    box-shadow:0 0 25px rgba(232,99,75,0.5);
  }
  .btn-secondary{
    border:1px solid var(--borda);
    color:var(--white);
    padding:15px 26px;
    border-radius:8px;
    font-weight:600;
    font-size:0.95rem;
    background: rgba(255,255,255,0.02);
  }

  /* PAINEL HUD CYBER */
  .cyber-panel{
    background:var(--bg-card);
    border:1px solid var(--borda);
    border-radius:18px;
    padding:26px;
    position:relative;
    box-shadow: 0 20px 40px rgba(0,0,0,0.5);
  }
  .cyber-panel::before {
    content: 'SYSTEM ACTIVE';
    position: absolute;
    top: 12px; right: 20px;
    font-family: 'Orbitron', sans-serif;
    font-size: 0.65rem;
    color: var(--sinal-verde);
    letter-spacing: 1px;
  }
  .cyber-panel img{
    border-radius:10px;
    width:100%;
    aspect-ratio:4/3;
    object-fit:cover;
    border: 1px solid #2d3748;
  }
  .panel-footer{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:20px;
  }
  .panel-footer .label{
    font-size:0.7rem;
    color:#64748b;
    text-transform:uppercase;
    letter-spacing:0.1em;
  }
  .panel-footer .value{
    font-family:'Orbitron', sans-serif;
    font-size:1.1rem;
    color:var(--sinal-amarelo);
  }

  /* ===== STRIP / MARQUEE ===== */
  .strip{
    background: #0f1318;
    color: var(--white);
    padding: 16px 0;
    overflow: hidden;
    white-space: nowrap;
    border-top: 1px solid var(--borda);
